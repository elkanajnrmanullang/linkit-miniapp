# Konfigurasi Infrastruktur Docker
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: linkit_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: linkit_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: linkit_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: rahasia_linkit_2026
      DATABASE_URL: "postgresql://admin:password123@postgres:5432/linkit_db?schema=public"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: linkit_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: